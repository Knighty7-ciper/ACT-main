# Staging Environment Configuration
# Updated for Supabase integration and modern design

# Application Settings
APP_NAME: "PESA-AFRIK"
APP_VERSION: "2.0.0"
NODE_ENV: "staging"
DEBUG: false

# Supabase Configuration (Primary Database)
SUPABASE_URL: "${SUPABASE_URL}"
SUPABASE_ANON_KEY: "${SUPABASE_ANON_KEY}"
SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY}"

# JWT Configuration
JWT_SECRET: "${JWT_SECRET}"
JWT_EXPIRATION: "7d"

# Backend Configuration
BACKEND_PORT: 3001
BACKEND_HOST: "0.0.0.0"
BACKEND_URL: "https://staging-api.pesa-afrik.com"

# Frontend Configuration
FRONTEND_URL: "https://staging.pesa-afrik.com"
NEXT_PUBLIC_API_URL: "https://staging.pesa-afrik.com/api"
NEXT_PUBLIC_BACKEND_URL: "https://staging-api.pesa-afrik.com"

# Admin Panel Configuration (New Path)
ADMIN_PATH: "/admino77"
ADMIN_ENABLED: true
ADMIN_ACCESS_LEVEL: "admin"

# Database Configuration (Legacy - Backup)
DATABASE_URL: "${DATABASE_URL}"
DATABASE_HOST: "staging-db.internal"
DATABASE_PORT: 5432
DATABASE_USER: "${DATABASE_USER}"
DATABASE_PASSWORD: "${DATABASE_PASSWORD}"
DATABASE_NAME: "african_currency_staging"

# Stellar Network Configuration
STELLAR_NETWORK: "TESTNET"
STELLAR_HORIZON_URL: "https://horizon-testnet.stellar.org"
STELLAR_SIGNING_KEY: "${STELLAR_SIGNING_KEY}"
STELLAR_PUBLIC_KEY: "${STELLAR_PUBLIC_KEY}"

# External APIs
EXCHANGE_RATE_API_KEY: "${EXCHANGE_RATE_API_KEY}"
GOLD_PRICE_API_KEY: "${GOLD_PRICE_API_KEY}"
NEWS_API_KEY: "${NEWS_API_KEY}"

# CORS Configuration
CORS_ORIGIN: "https://staging.pesa-afrik.com"
CORS_ENABLED: true

# Email Configuration
SMTP_HOST: "${SMTP_HOST}"
SMTP_PORT: 587
SMTP_USER: "${SMTP_USER}"
SMTP_PASSWORD: "${SMTP_PASSWORD}"
SENDER_EMAIL: "noreply@pesa-afrik.com"

# Development Features
AUTO_UPDATE_RATES: true
DEMO_MODE: false
ENABLE_HOT_RELOAD: false
LOG_LEVEL: "info"

# Security Configuration
SECURE_COOKIES: true
TRUST_PROXY: true
RATE_LIMIT_ENABLED: true
RATE_LIMIT_WINDOW_MS: 900000
RATE_LIMIT_MAX_REQUESTS: 100

# Feature Flags
FEATURE_PPP_CALCULATIONS: true
FEATURE_ADMIN_PANEL: true
FEATURE_KYC: true
FEATURE_NEWS: true
FEATURE_MOBILE_APP: false

# Monitoring and Analytics
SENTRY_DSN: "${SENTRY_DSN}"
GOOGLE_ANALYTICS_ID: "${GOOGLE_ANALYTICS_ID}"

# SSL Configuration
SSL_CERT_PATH: "/etc/ssl/certs/staging.pem"
SSL_KEY_PATH: "/etc/ssl/private/staging.key"

# CDN Configuration
CDN_URL: "https://cdn-staging.pesa-afrik.com"