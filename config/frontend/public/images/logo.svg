<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gradient for depth -->
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#006847;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004d35;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gold gradient for accent elements -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDB913;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e5a700;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle (optional container) -->
  <circle cx="256" cy="256" r="240" fill="#1A202C" />
  
  <!-- Shield shape -->
  <path 
    d="M256 60 
       L420 120 
       L420 280 
       Q420 380 256 460 
       Q92 380 92 280 
       L92 120 
       Z" 
    fill="url(#shieldGradient)"
    stroke="#FDB913"
    stroke-width="8"
  />
  
  <!-- Circuitry network - African continent abstraction -->
  <g stroke="#FDB913" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Central node (West Africa) -->
    <circle cx="200" cy="220" r="20" fill="#FDB913" stroke="none" />
    
    <!-- East Africa node -->
    <circle cx="312" cy="200" r="16" fill="none" stroke="#FDB913" stroke-width="4" />
    
    <!-- Southern Africa node -->
    <circle cx="256" cy="350" r="18" fill="none" stroke="#FDB913" stroke-width="4" />
    
    <!-- North Africa node -->
    <circle cx="280" cy="140" r="14" fill="none" stroke="#FDB913" stroke-width="4" />
    
    <!-- Connection lines forming "P" shape and circuit pattern -->
    <path d="M200 220 L280 140" />
    <path d="M200 220 L312 200" />
    <path d="M200 220 L256 350" />
    <path d="M312 200 L256 350" />
    <path d="M280 140 L312 200" />
    <path d="M256 350 L200 220" stroke-width="8" />
  </g>
  
  <!-- Central Pesa symbol -->
  <g transform="translate(256, 256)" filter="url(#glow)">
    <text 
      x="0" 
      y="20" 
      text-anchor="middle" 
      fill="#FFFFFF" 
      font-family="Arial, sans-serif" 
      font-size="60" 
      font-weight="bold"
    >
      P
    </text>
  </g>
  
  <!-- Small decorative nodes -->
  <circle cx="140" cy="160" r="6" fill="#FDB913" />
  <circle cx="372" cy="280" r="5" fill="#FDB913" />
  <circle cx="176" cy="320" r="4" fill="#FDB913" />
  
  <!-- Text label (optional - can be removed for icon-only version) -->
  <text 
    x="256" 
    y="495" 
    text-anchor="middle" 
    fill="#FDB913" 
    font-family="Arial, sans-serif" 
    font-size="28" 
    font-weight="bold"
    letter-spacing="4"
  >
    PESA-AFRIK
  </text>
</svg>
